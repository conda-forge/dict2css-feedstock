{% set name = "dict2css" %}
{% set version = "0.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/dict2css-{{ version }}.tar.gz
  sha256: fbb01ebf86c5b667aa9d0348294ef7141a1ee0b64df75d468ea423e1aaef561a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - whey >=0.0.20
  run:
    - cssutils <=2.11.0,>=2.2.0
    - domdf-python-tools >=2.2.0
    - python >={{ python_min }}

test:
  imports:
    - dict2css
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/sphinx-toolbox/dict2css
  summary: A μ-library for constructing cascading style sheets from Python dictionaries.
  license: MIT
  license_file: LICENSE
  doc_url: https://dict2css.readthedocs.io/en/latest

extra:
  recipe-maintainers:
    - domdfcoding
